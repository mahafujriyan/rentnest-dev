$kind: http-request
method: POST
url: '{{baseUrl}}/payments/confirm'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "rentalRequestId": "{{rentalRequestId}}",
      "paymentIntentId": "{{paymentIntentId}}"
    }
