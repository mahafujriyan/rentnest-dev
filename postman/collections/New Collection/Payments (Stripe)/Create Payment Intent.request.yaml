$kind: http-request
method: POST
url: '{{baseUrl}}/payments/create'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "rentalRequestId": "{{rentalRequestId}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const res = pm.response.json();
      if (res.data?.paymentIntentId) pm.collectionVariables.set('paymentIntentId', res.data.paymentIntentId);
