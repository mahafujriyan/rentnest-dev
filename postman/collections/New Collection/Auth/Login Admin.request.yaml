$kind: http-request
method: POST
url: '{{baseUrl}}/auth/login'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@rentnest.com",
      "password": "admin123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const res = pm.response.json();
      if (res.data?.accessToken) pm.collectionVariables.set('token', res.data.accessToken);
