services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rentnest
    ports:
      - "5432:5432"
    volumes:
      - rentnest_pg:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - db

volumes:
  rentnest_pg:
